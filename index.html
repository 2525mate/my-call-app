<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>無料ウェブ通話アプリ</title>
  <script src="https://jsdelivr.net"></script>
  <style>
    body { margin: 10px; font-family: sans-serif; background: #f0f2f5; text-align: center; }
    video { background-color: #111; width: 90%; max-height: 350px; border-radius: 8px; margin: 5px auto; display: block; }
    input, button, select { width: 115px; margin: 3px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 12px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:disabled { background: #ccc; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
    .item { border: 1px solid #ddd; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .id-text { font-size: 11px; color: #666; margin: 5px 0; }
    #button-area { margin-top: 10px; min-height: 40px; }
    #remote-videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  </style>
</head>
<body>

<h1>SkyWayウェブ通話</h1>

<div class="grid-container">
  <!-- 自分のエリア -->
  <div id="local" class="item">
    <video id="local-video" autoplay playsinline muted></video>
    <audio id="local-audio" autoplay muted style="display:none;"></audio>
    <p class="id-text">ID: <span id="my-id">---</span></p>
    
    <input id="room-name" placeholder="Room名"></input>
    <button id="join-button">Room作成/参加</button>
    <button id="local-mute-buton" disabled>映像・音声OFF</button>
    <button id="leave-button" disabled>退出</button>
    
    <p style="font-size:10px; color:#999; margin-top:10px;">※このURLをLINEに貼れば同じ部屋に入れます</p>
  </div>

  <!-- 他人のエリア -->
  <div id="remote" class="item">
    <p class="id-text">相手のID: <span id="remote-id">待機中...</span></p>
    <div id="button-area"></div>
    <div id="remote-videos">
      <!-- 相手の映像がここに並ぶ -->
      <video id="remote-video" autoplay playsinline></video>
      <audio id="remote-audio" autoplay></audio>
    </div>
  </div>
</div>

<script>
const { SkyWayAuthToken, SkyWayContext, SkyWayRoom, SkyWayStreamFactory, uuidV4, nowInSec } = skyway_room;

(async () => {
  // --- 【設定】ここを必ず書き換えてください ---
  const appId = 'b0dc9644-63d5-47ea-9739-249a5b37166c';
  const secretKey = 'qnBPgT3FbZc9d90O+jBiOzLkFvKS1Blf+CwpyrRwNYo=';
  // -----------------------------------------

  const localVideo = document.getElementById('local-video');
  const localAudio = document.getElementById('local-audio');
  const roomNameInput = document.getElementById('room-name');
  const joinButton = document.getElementById('join-button');
  const localMuteButton = document.getElementById('local-mute-buton');
  const leaveButton = document.getElementById('leave-button');
  const myId = document.getElementById('my-id');
  const remoteId = document.getElementById('remote-id');
  const remoteVideo = document.getElementById('remote-video');
  const remoteAudio = document.getElementById('remote-audio');
  const buttonArea = document.querySelector('#button-area');

  let isMuted = false;
  let me, room, audio, video, localAudioPublication, localVideoPublication;

  // URLから部屋名を自動取得
  const params = new URLSearchParams(window.location.search);
  let urlRoomName = params.get('room');
  if (urlRoomName) {
    roomNameInput.value = urlRoomName;
  } else {
    urlRoomName = Math.random().toString(36).substring(7);
    window.history.pushState(null, null, `?room=${urlRoomName}`);
    roomNameInput.value = urlRoomName;
  }

  // STEP2: 自分のカメラ・マイク取得（軽量設定）
  const { audio: a, video: v } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream({
    audio: true,
    video: { width: 426, height: 240, frameRate: 10 }
  });
  audio = a; video = v;
  audio.attach(localAudio);
  video.attach(localVideo);

  // STEP6-1: 受信処理の定義
  const subscribeAndAttach = (publication) => {
    if (publication.publisher.id === me.id) return;
    remoteId.textContent = publication.publisher.id;

    const subscribeButton = document.createElement('button');
    subscribeButton.textContent = publication.contentType === 'video' ? '映像を受信' : '音声を受信';
    buttonArea.appendChild(subscribeButton);

    subscribeButton.onclick = async () => {
      const { stream, subscription } = await me.subscribe(publication.id);
      if (publication.contentType === 'video') {
        stream.attach(remoteVideo);
        subscription.changePreferredEncoding('low');
      } else {
        stream.attach(remoteAudio);
      }
      subscribeButton.disabled = true;
    };
    publication.onDisabled.add(() => remoteVideo.load());
  };

  // 参加ボタン
  joinButton.onclick = async () => {
    if (roomNameInput.value === '') return;
    joinButton.disabled = true;

    // STEP3: 接続
    const context = await SkyWayContext.CreateForDevelopment(appId, secretKey);
    room = await SkyWayRoom.FindOrCreate(context, { type: 'sfu', name: roomNameInput.value });
    
    // STEP4: 入室
    me = await room.join();
    myId.textContent = me.id;
    localMuteButton.disabled = false;
    leaveButton.disabled = false;

    // STEP5: 送信（サイマルキャスト設定）
    localAudioPublication = await me.publish(audio);
    localVideoPublication = await me.publish(video, {
      encodings: [
        { maxBitrate: 80_000, id: 'low' },
        { maxBitrate: 500_000, id: 'middle' },
        { maxBitrate: 5_000_000, id: 'high' },
      ],
    });

    // STEP6: 受信開始
    room.publications.forEach(subscribeAndAttach);
    room.onStreamPublished.add((e) => subscribeAndAttach(e.publication));
    
    joinButton.textContent = "参加中";
  };

  // STEP7: ミュート
  localMuteButton.onclick = async () => {
    if(isMuted){
      await localAudioPublication.enable();
      await localVideoPublication.enable();
      isMuted = false;
      localMuteButton.textContent = '映像・音声OFF';
    }else{
      await localAudioPublication.disable();
      await localVideoPublication.disable();
      isMuted = true;
      localMuteButton.textContent = '映像・音声 ON';
    }
  };

  // STEP8: 退出
  leaveButton.onclick = async () => {
    await me.leave();
    location.reload();
  };
})();
</script>
</body>
</html>
