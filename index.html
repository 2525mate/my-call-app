<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SkyWay Handson</title>
    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room/dist/skyway_room.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        video { width: 300px; background: #000; }
        .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>SkyWay 接続テスト</h1>
    <div class="card">
        <video id="local-video" autoplay playsinline></video>
        <input id="room-name" placeholder="ルーム名">
        <button id="join-button">Room作成/参加</button>
    </div>
    <div id="remote-area" class="card">
        <video id="remote-video" autoplay playsinline></video>
        <div id="button-area"></div>
    </div>

<script>
    // ブラウザがSDKを認識するまで待つための処理
    const startApp = async () => {
        const { nowInSec, SkyWayAuthToken, SkyWayContext, SkyWayRoom, SkyWayStreamFactory, uuidV4 } = skyway_room;

        // --- 設定 ---
        const appId = 'b0dc9644-63d5-47ea-9739-249a5b37166c';
        const secretKey = 'qnBPgT3FbZc9d90O+jBiOzLkFvKS1Blf+CwpyrRwNYo=';

        const localVideo = document.getElementById('local-video');
        const roomNameInput = document.getElementById('room-name');
        const joinButton = document.getElementById('join-button');
        const remoteVideo = document.getElementById('remote-video');
        const buttonArea = document.getElementById('button-area');

        // カメラ取得
        const { audio, video } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream();
        video.attach(localVideo);

        joinButton.onclick = async () => {
            console.log("ボタンが押されました"); // 確認用

            // トークン生成（ご指定のロジック）
            const token = new SkyWayAuthToken({
                jti: uuidV4(), iat: nowInSec(), exp: nowInSec() + 3600,
                scope: {
                    app: {
                        id: appId, turn: true, actions: ['read'],
                        channels: [{
                            id: '*', name: '*', actions: ['write'],
                            members: [{
                                id: '*', name: '*', actions: ['write'],
                                publication: { actions: ['write'] },
                                subscription: { actions: ['write'] },
                            }],
                            sfuBots: [{ actions: ['write'], forwardings: [{ actions: ['write'] }] }],
                        }],
                    },
                },
            }).encode(secretKey);

            // ContextとRoomの作成
            const context = await SkyWayContext.Create(token);
            const room = await SkyWayRoom.FindOrCreate(context, {
                type: 'sfu',
                name: roomNameInput.value,
            });

            const me = await room.join();
            console.log("入室成功:", me.id);

            await me.publish(audio);
            await me.publish(video);

            room.onStreamPublished.add(async (e) => {
                if (e.publication.publisher.id === me.id) return;
                const btn = document.createElement('button');
                btn.textContent = "受信開始";
                buttonArea.appendChild(btn);
                btn.onclick = async () => {
                    const { stream } = await me.subscribe(e.publication.id);
                    stream.attach(remoteVideo);
                };
            });
        };
    };

    // SDKが読み込まれたら開始
    if (window.skyway_room) {
        startApp();
    } else {
        window.addEventListener('load', startApp);
    }
</script>
</body>
</html>
