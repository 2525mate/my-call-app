<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWay SFU Room - Final</title>
    <!-- SkyWay SDKの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room/dist/skyway_room.js"></script>
    <style>
        body { margin: 20px; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; background: #000; border-radius: 8px; max-height: 300px; object-fit: cover; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .id-text { font-size: 12px; color: #777; word-break: break-all; margin-top: 5px; }
        #local-mute-buton { background: #6c757d; }
        #leave-button { background: #dc3545; }
        #button-area button { background: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SkyWay SFU Room</h1>
    <div class="grid">
        <!-- 自分のエリア -->
        <div class="card">
            <h2>自分</h2>
            <video id="local-video" autoplay playsinline></video>
            <audio id="local-audio" autoplay muted controls></audio>
            <p class="id-text">My ID: <span id="my-id">---</span></p>
            <input id="room-name" placeholder="Room名を入力（例: niko-room）">
            <button id="join-button">Room作成 / 参加</button>
            <button id="local-mute-buton" disabled>映像・音声 OFF</button>
            <button id="leave-button" disabled>Roomを閉じる</button>
        </div>

        <!-- 相手のエリア -->
        <div class="card">
            <h2>相手</h2>
            <video id="remote-video" autoplay playsinline></video>
            <audio id="remote-audio" autoplay controls></audio>
            <p class="id-text">Remote ID: <span id="remote-id">---</span></p>
            <div id="button-area"></div>
        </div>
    </div>
</div>

<script>
    const { nowInSec, SkyWayAuthToken, SkyWayContext, SkyWayRoom, SkyWayStreamFactory, uuidV4 } = skyway_room;

    // --- 【重要】ここに自分の情報を貼り付けてください ---
    const appId = 'アプリケーションIDをここに貼り付け';
    const secretKey = 'シークレットキーをここに貼り付け';

    (async () => {
        // 要素の取得
        const localAudio = document.getElementById('local-audio');
        const localVideo = document.getElementById('local-video');
        const roomNameInput = document.getElementById('room-name');
        const joinButton = document.getElementById('join-button');
        const localMuteButton = document.getElementById('local-mute-buton');
        const leaveButton = document.getElementById('leave-button');
        const myId = document.getElementById('my-id');
        const remoteId = document.getElementById('remote-id');
        const remoteVideo = document.getElementById('remote-video');
        const remoteAudio = document.getElementById('remote-audio');
        const buttonArea = document.querySelector('#button-area');

        let isMuted = false;

        // カメラとマイクの初期取得
        const { audio, video } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream();
        audio.attach(localAudio);
        video.attach(localVideo);

        joinButton.onclick = async () => {
            if (roomNameInput.value === '') {
                alert('Room名を入力してください');
                return;
            }
            joinButton.disabled = true;
            joinButton.innerText = '接続中...';

            // --- 【絶対に必要】ご提示いただいたToken生成ロジック ---
            const token = new SkyWayAuthToken({
                jti: uuidV4(),
                iat: nowInSec(),
                exp: nowInSec() + 60 * 60 * 24,
                scope: {
                    app: {
                        id: appId,
                        turn: true,
                        actions: ['read'],
                        channels: [{
                            id: '*',
                            name: '*',
                            actions: ['write'],
                            members: [{
                                id: '*',
                                name: '*',
                                actions: ['write'],
                                publication: { actions: ['write'] },
                                subscription: { actions: ['write'] },
                            }],
                            sfuBots: [{
                                actions: ['write'],
                                forwardings: [{ actions: ['write'] }],
                            }],
                        }],
                    },
                },
            }).encode(secretKey);

            try {
                // SkyWayへの接続開始
                const context = await SkyWayContext.Create(token);
                const room = await SkyWayRoom.FindOrCreate(context, {
                    type: 'sfu',
                    name: roomNameInput.value,
                });

                const me = await room.join();
                myId.textContent = me.id;

                // UI状態の更新
                localMuteButton.disabled = false;
                leaveButton.disabled = false;
                joinButton.innerText = '接続済み';

                // 自分の映像・音声を配信
                const localAudioPub = await me.publish(audio);
                const localVideoPub = await me.publish(video, {
                    encodings: [
                        { maxBitrate: 80_000, id: 'low' },
                        { maxBitrate: 500_000, id: 'middle' },
                        { maxBitrate: 5000_000, id: 'high' },
                    ],
                });

                // 受信処理の定義
                const subscribeAndAttach = (publication) => {
                    if (publication.publisher.id === me.id) return;
                    remoteId.textContent = publication.publisher.id;

                    const subBtn = document.createElement('button');
                    subBtn.textContent = `${publication.contentType}を受信開始`;
                    buttonArea.appendChild(subBtn);

                    subBtn.onclick = async () => {
                        const { stream, subscription } = await me.subscribe(publication.id);
                        if (stream.track.kind === 'video') {
                            stream.attach(remoteVideo);
                            subscription.changePreferredEncoding('low');
                            publication.onDisabled.add(() => remoteVideo.load());
                        } else {
                            stream.attach(remoteAudio);
                        }
                        subBtn.disabled = true;
                        subBtn.innerText = `${publication.contentType}受信中`;
                    };
                };

                // すでに入室している人の分を処理
                room.publications.forEach(subscribeAndAttach);
                // あとから入ってきた人の分を処理
                room.onStreamPublished.add((e) => subscribeAndAttach(e.publication));

                // ミュートボタン
                localMuteButton.onclick = async () => {
                    if (isMuted) {
                        await localAudioPub.enable();
                        await localVideoPub.enable();
                        localMuteButton.textContent = '映像・音声 OFF';
                    } else {
                        await localAudioPub.disable();
                        await localVideoPub.disable();
                        localMuteButton.textContent = '映像・音声 ON';
                    }
                    isMuted = !isMuted;
                };

                // 退室ボタン
                leaveButton.onclick = async () => {
                    await me.leave();
                    await room.close();
                    location.reload();
                };

                room.onMemberLeft.add(() => {
                    buttonArea.innerHTML = '';
                    remoteId.textContent = '退出しました';
                });

            } catch (error) {
                console.error(error);
                alert('エラーが発生しました。コンソールを確認してください。');
                joinButton.disabled = false;
                joinButton.innerText = 'Room作成 / 参加';
            }
        };
    })();
</script>
</body>
</html>
