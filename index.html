<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SkyWay Handson</title>
    <!-- ライブラリを真っ先に読み込む -->
    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room/dist/skyway_room.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        video { width: 100%; background: #000; border-radius: 5px; margin-bottom: 10px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>SkyWay 通話テスト</h2>
        <video id="local-video" autoplay playsinline></video>
        <input id="room-name" placeholder="部屋の名前を入力">
        <button id="join-button">Room作成 / 参加</button>
        <div id="button-area"></div>
        <video id="remote-video" autoplay playsinline></video>
    </div>

<script>
    // 修正ポイント：ライブラリが完全に読み込まれてから中身を実行する
    window.addEventListener('load', async () => {
        
        // ライブラリの存在をチェック（ここでもしエラーならネット接続の問題）
        if (typeof skyway_room === 'undefined') {
            alert("SkyWayライブラリが読み込めていません。リロードしてください。");
            return;
        }

        const { nowInSec, SkyWayAuthToken, SkyWayContext, SkyWayRoom, SkyWayStreamFactory, uuidV4 } = skyway_room;

        // --- 設定：ここを自分のものに変えてください ---
        const appId = '5fd4c76a-45ec-4ae8-8e88-988824d5b777';
        const secretKey = 'Ae+MQqwkEBvUVhLU+ecdljnIY1DMEXwZeaoFEMevl70=';

        const localVideo = document.getElementById('local-video');
        const roomNameInput = document.getElementById('room-name');
        const joinButton = document.getElementById('join-button');
        const remoteVideo = document.getElementById('remote-video');
        const buttonArea = document.getElementById('button-area');

        // カメラとマイクの準備
        const { audio, video } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream();
        video.attach(localVideo);

        joinButton.onclick = async () => {
            if (!roomNameInput.value) return;
            joinButton.disabled = true;
            joinButton.innerText = "接続中...";

            // トークン生成ロジック（必須の箇所）
            const token = new SkyWayAuthToken({
                jti: uuidV4(),
                iat: nowInSec(),
                exp: nowInSec() + 60 * 60 * 24,
                scope: {
                    app: {
                        id: appId,
                        turn: true,
                        actions: ['read'],
                        channels: [{
                            id: '*',
                            name: '*',
                            actions: ['write'],
                            members: [{
                                id: '*',
                                name: '*',
                                actions: ['write'],
                                publication: { actions: ['write'] },
                                subscription: { actions: ['write'] },
                            }],
                            sfuBots: [{
                                actions: ['write'],
                                forwardings: [{ actions: ['write'] }],
                            }],
                        }],
                    },
                },
            }).encode(secretKey);

            try {
                // コンテキストとルームの作成（必須の箇所）
                const context = await SkyWayContext.Create(token);
                const room = await SkyWayRoom.FindOrCreate(context, {
                    type: 'sfu',
                    name: roomNameInput.value,
                });

                const me = await room.join();
                joinButton.innerText = "参加中";

                await me.publish(audio);
                await me.publish(video);

                const subscribeAndAttach = async (publication) => {
                    if (publication.publisher.id === me.id) return;

                    const btn = document.createElement('button');
                    btn.textContent = "相手の映像を受信";
                    buttonArea.appendChild(btn);

                    btn.onclick = async () => {
                        const { stream } = await me.subscribe(publication.id);
                        stream.attach(remoteVideo);
                        btn.remove();
                    };
                };

                room.publications.forEach(subscribeAndAttach);
                room.onStreamPublished.add((e) => subscribeAndAttach(e.publication));

            } catch (err) {
                console.error(err);
                alert("エラーが発生しました。詳細はコンソールを見てください。");
                joinButton.disabled = false;
                joinButton.innerText = "Room作成 / 参加";
            }
        };
    });
</script>
</body>
</html>
