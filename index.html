<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SkyWay Simple Test</title>
    <!-- 読み込み先を unpkg に変更し、確実にその場で読み込ませる -->
    <script src="https://unpkg.com/@skyway-sdk/room/dist/skyway_room.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; text-align: center; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 8px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        #status { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>SkyWay 通話テスト</h2>
    <video id="local-video" autoplay playsinline muted></video>
    <input id="room-name" placeholder="ルーム名を入力">
    <button id="join-button">Room作成 / 参加</button>
    <p id="status">準備中...</p>
    <div id="button-area"></div>
    <video id="remote-video" autoplay playsinline></video>
</div>

<script>
    // ブラウザが準備できたら実行
    window.addEventListener('load', async () => {
        const status = document.getElementById('status');
        
        // ライブラリの有無を確認
        if (typeof skyway_room === 'undefined') {
            status.innerText = "エラー：ライブラリが読み込めません。再読み込みしてください。";
            return;
        }

        const { nowInSec, SkyWayAuthToken, SkyWayContext, SkyWayRoom, SkyWayStreamFactory, uuidV4 } = skyway_room;

        // --- ★ 自分のキーに書き換え ---
        const appId = '5fd4c76a-45ec-4ae8-8e88-988824d5b777';
        const secretKey = 'Ae+MQqwkEBvUVhLU+ecdljnIY1DMEXwZeaoFEMevl70=';

        const joinButton = document.getElementById('join-button');
        const roomNameInput = document.getElementById('room-name');

        status.innerText = "カメラを起動中...";

        try {
            // カメラとマイクの取得
            const { audio, video } = await SkyWayStreamFactory.createMicrophoneAudioAndCameraStream();
            video.attach(document.getElementById('local-video'));
            status.innerText = "準備完了！";

            joinButton.onclick = async () => {
                if (!roomNameInput.value) return alert("ルーム名を入力してください");
                
                joinButton.disabled = true;
                status.innerText = "接続中...";

                // トークン生成（指定のロジック）
                const token = new SkyWayAuthToken({
                    jti: uuidV4(), iat: nowInSec(), exp: nowInSec() + 86400,
                    scope: {
                        app: {
                            id: appId, turn: true, actions: ['read'],
                            channels: [{
                                id: '*', name: '*', actions: ['write'],
                                members: [{
                                    id: '*', name: '*', actions: ['write'],
                                    publication: { actions: ['write'] },
                                    subscription: { actions: ['write'] },
                                }],
                                sfuBots: [{ actions: ['write'], forwardings: [{ actions: ['write'] }] }],
                            }],
                        },
                    },
                }).encode(secretKey);

                const context = await SkyWayContext.Create(token);
                const room = await SkyWayRoom.FindOrCreate(context, {
                    type: 'sfu',
                    name: roomNameInput.value,
                });

                const me = await room.join();
                status.innerText = "入室しました！";

                await me.publish(audio);
                await me.publish(video);

                room.onStreamPublished.add(async (e) => {
                    if (e.publication.publisher.id === me.id) return;
                    
                    const btn = document.createElement('button');
                    btn.textContent = "相手の映像を受信";
                    document.getElementById('button-area').appendChild(btn);
                    
                    btn.onclick = async () => {
                        const { stream } = await me.subscribe(e.publication.id);
                        stream.attach(document.getElementById('remote-video'));
                        btn.remove();
                    };
                });
            };
        } catch (e) {
            status.innerText = "カメラエラー。HTTPSで開いているか確認してください。";
            console.error(e);
        }
    });
</script>
</body>
</html>
